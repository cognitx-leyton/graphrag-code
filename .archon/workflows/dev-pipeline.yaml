name: dev-pipeline
description: |
  Use when: implementing a feature, fixing a bug, or working on a GitHub issue for codegraph.
  Triggers: "start workflow", "implement issue", "dev pipeline", "work on issue"
  Does: preflight -> research -> plan -> implement -> review -> commit -> critique -> roadmap -> package -> test -> file-issues -> create-pr
  NOT for: quick one-off fixes, documentation-only changes, manual exploration

  Run with:
    archon workflow run dev-pipeline --from hotfix --branch feat/issue-<N>-<slug> "implement issue #<N>"

  Examples:
    archon workflow run dev-pipeline --from hotfix --branch feat/issue-12-mcp-prompts "implement issue #12"
    archon workflow run dev-pipeline --from hotfix --branch fix/issue-15-unresolved-imports "investigate issue #15"
    archon workflow run dev-pipeline --from hotfix --branch feat/issue-13-incremental-reindex "implement issue #13"

  Branch naming: feat/ for features, fix/ for bugs, chore/ for maintenance.
  Always base off hotfix (--from hotfix) to get the latest code.

provider: claude
model: sonnet
effort: high

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Step 0: Pre-flight checks
  # ═══════════════════════════════════════════════════════════════

  - id: preflight
    bash: |
      set -e
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"

      PASS=true
      echo "=== Pre-flight Checks ==="

      # Git branch — should be a feature branch (feat/, fix/, chore/) not main/release/hotfix
      BRANCH=$(git branch --show-current)
      case "$BRANCH" in
        main|release|hotfix)
          echo "FAIL: on protected branch $BRANCH — use --branch feat/issue-N-slug"
          PASS=false
          ;;
        *)
          echo "PASS: on branch $BRANCH"
          ;;
      esac

      # Working tree
      DIRTY=$(git status --porcelain | grep -v '^\?\?' | head -1)
      if [ -z "$DIRTY" ]; then
        echo "PASS: working tree clean"
      else
        echo "FAIL: uncommitted changes"
        PASS=false
      fi

      # Neo4j
      if docker ps --format '{{.Names}}' | grep -q codegraph-neo4j; then
        echo "PASS: Neo4j running"
      else
        echo "WARN: Neo4j not running — starting..."
        docker compose up -d
        sleep 5
        echo "PASS: Neo4j started"
      fi

      # Venv
      if .venv/bin/codegraph --help > /dev/null 2>&1; then
        echo "PASS: venv OK"
      else
        echo "FAIL: venv missing or broken"
        PASS=false
      fi

      # Tests
      TEST_OUT=$(.venv/bin/python -m pytest tests/ -q 2>&1)
      TEST_EXIT=$?
      PASS_COUNT=$(echo "$TEST_OUT" | tail -1)
      if [ $TEST_EXIT -eq 0 ]; then
        echo "PASS: tests — $PASS_COUNT"
      else
        echo "FAIL: tests — $PASS_COUNT"
        PASS=false
      fi

      if [ "$PASS" = "true" ]; then
        echo "READY"
      else
        echo "NOT_READY"
        exit 1
      fi
    timeout: 120000

  # ═══════════════════════════════════════════════════════════════
  # Step 1+2: Research the issue
  # ═══════════════════════════════════════════════════════════════

  - id: research
    depends_on: [preflight]
    model: opus
    effort: high
    prompt: |
      You are researching a codegraph issue/feature before planning implementation.

      Find the repo root with: REPO=$(git rev-parse --show-toplevel)
      The codegraph package is at: $REPO/codegraph

      User request: $USER_MESSAGE

      ## Instructions

      ### 1. Fetch the GitHub issue
      If the input contains a GitHub issue number:
      ```bash
      gh issue view <number>
      ```

      ### 2. Query the codegraph (MANDATORY — do NOT skip this)
      The codegraph CLI is at `$REPO/codegraph/.venv/bin/codegraph`. You MUST run at least 3
      codegraph queries below before proceeding. Do NOT substitute with Read/Grep — the graph
      has cross-file relationships that file reading cannot reveal.

      Find affected symbols:
      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      .venv/bin/codegraph query "MATCH (c:Class) WHERE c.name CONTAINS '<keyword>' RETURN c.name, c.file"
      .venv/bin/codegraph query "MATCH (f:Function) WHERE f.name CONTAINS '<keyword>' RETURN f.name, f.file"
      ```

      Check blast radius (who depends on affected symbols):
      ```bash
      .venv/bin/codegraph query "MATCH (f:File)-[r:IMPORTS_SYMBOL]->(g:File) WHERE r.symbol = '<symbol>' RETURN f.path, g.path"
      .venv/bin/codegraph query "MATCH (m:Method)-[:CALLS]->(t:Method) WHERE t.name = '<method>' RETURN m.name, m.file"
      ```

      Check architecture conformance:
      ```bash
      .venv/bin/codegraph arch-check
      ```

      Check for related endpoints, decorators, edges:
      ```bash
      .venv/bin/codegraph query "MATCH (e:Endpoint) WHERE e.path CONTAINS '<keyword>' RETURN e.method, e.path, e.handler"
      .venv/bin/codegraph query "MATCH (n)-[r:DECORATED_BY]->(d) WHERE d.id CONTAINS '<decorator>' RETURN n.name, n.file, d.id"
      ```

      ### 3. Read affected source files
      Read the files identified by codegraph queries. Understand existing patterns, conventions, and test coverage.

      ### 4. External documentation research
      If the issue involves external libraries or APIs:

      **NotebookLM CLI** (for deep research with sources):
      ```bash
      nlm notebook list
      nlm notebook query <notebook-id> "<question>"
      nlm source add <notebook-id> --url "<doc-url>"
      nlm research start "<topic>"
      ```

      **Context7 MCP** (for library documentation):
      Use the context7 MCP tools to fetch current docs for any library mentioned in the issue.

      ### 5. Write research summary
      Write to `$ARTIFACTS_DIR/research.md` with:
      - Issue context (title, description, key requirements)
      - Affected files and symbols (from codegraph queries)
      - Blast radius (who depends on what's changing)
      - External context (library docs, API details)
      - Risks and edge cases
      - Recommended approach

      When done, output the research summary.

  # ═══════════════════════════════════════════════════════════════
  # Step 3: Create plan
  # ═══════════════════════════════════════════════════════════════

  - id: plan
    depends_on: [research]
    model: opus
    effort: high
    prompt: |
      Create an implementation plan based on the research. Do NOT enter plan mode.
      Do NOT use /plan or any interactive planning mode. Just write a plan file directly.

      Find the repo with: REPO=$(git rev-parse --show-toplevel)

      Research findings:
      $research.output

      ## Instructions

      Read the file `$REPO/.claude/commands/plan_local.md` for the full plan template and follow
      its structure exactly. Write the plan directly to a file — do NOT invoke any skills
      or slash commands.

      The plan MUST include:

      1. **Summary** — what we're building
      2. **Reuse Inventory** — existing code to reuse (file:line references)
      3. **Patterns to Mirror** — code snippets to follow
      4. **Files to Change** — CREATE/UPDATE with purpose
      5. **Tasks** — ordered, atomic, verifiable with Mirror references
      6. **Acceptance Criteria** — SPECIFIC and VERIFIABLE per feature area:
         - Each criterion states WHAT to check and HOW to verify
         - Include codegraph queries where structural changes are expected
         - Include expected test counts
         - NO vague criteria like "tests pass" or "feature works"

      Save the plan to `$REPO/.claude/plans/` with a descriptive kebab-case name.
      Use the FULL path from the working directory, not ~/.claude/plans/.
      The plan MUST be inside the repo, not in your home directory.

      Output the plan file path when done.

  # ═══════════════════════════════════════════════════════════════
  # Step 4: Implement
  # ═══════════════════════════════════════════════════════════════

  - id: implement
    depends_on: [plan]
    model: opus
    effort: high
    idle_timeout: 600000
    prompt: |
      Read the plan and implement ALL tasks.

      Plan: $plan.output
      User request: $USER_MESSAGE

      ## Instructions

      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      ```

      For each task in the plan, in order:
      1. Read the Mirror/context files referenced in the task
      2. Implement the change
      3. Validate immediately after EVERY file change:
         ```bash
         python -m compileall codegraph/ -q
         .venv/bin/python -m pytest tests/ -q
         ```
      4. Fix any failures before moving to the next task

      After ALL tasks are done, output a summary of what was implemented.
    hooks:
      PostToolUse:
        - matcher: "Write|Edit"
          response:
            systemMessage: "Run byte-compile and tests NOW to catch errors early."

  # ═══════════════════════════════════════════════════════════════
  # Step 5: Review (MANDATORY — separate node guarantees it runs)
  # ═══════════════════════════════════════════════════════════════

  - id: review
    depends_on: [implement]
    model: opus
    effort: high
    idle_timeout: 300000
    prompt: |
      You MUST run a code review on all changed files. This is a mandatory step.

      Implementation summary: $implement.output

      ## Instructions

      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      ```

      ### 1. Get the list of changed files
      ```bash
      git diff --name-only HEAD
      git diff --cached --name-only
      ```

      ### 2. Spawn the code reviewer (MANDATORY)
      Use the built-in `feature-dev:code-reviewer` agent to review all changed files.
      Focus on: logic bugs, edge cases, security, inconsistencies with codebase patterns.
      Only report issues with >80% confidence.

      ### 3. Run architecture check
      ```bash
      .venv/bin/codegraph arch-check
      ```

      ### 4. Run tests
      ```bash
      .venv/bin/python -m pytest tests/ -q
      ```

      ### 5. Fix and re-review
      If the code reviewer found issues:
      - Fix each issue
      - Re-run the code reviewer on the fixed files
      - Repeat until 0 issues remain

      If arch-check found violations:
      - Fix them
      - Re-run arch-check

      ### 6. Exit condition
      Only finish when ALL of these are true:
      - Code reviewer reports 0 high-confidence issues
      - arch-check passes (exit 0)
      - All tests pass

      Output: list of files reviewed, issues found, issues fixed, final status.

  # ═══════════════════════════════════════════════════════════════
  # Step 6: Commit
  # ═══════════════════════════════════════════════════════════════

  - id: commit
    depends_on: [review]
    model: sonnet
    context: fresh
    prompt: |
      Commit all changes with a conventional commit message.

      Review summary: $review.output

      ## Instructions

      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      ```

      1. Stage the changed files (NOT .claude/ local files, NOT .env):
         ```bash
         git add <specific changed files>
         ```

      2. Commit with conventional format and Co-Authored-By:
         ```bash
         git commit -m "$(cat <<'EOF'
         <type>(<scope>): <concise description of WHY>

         <Detailed body>

         Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>
         EOF
         )"
         ```

      3. Verify:
         ```bash
         git log --oneline -1
         git branch --show-current  # must be feature branch, NOT main/hotfix/dev
         ```

      Output the commit SHA and message.

  # ═══════════════════════════════════════════════════════════════
  # Step 7: Critique (structured output for routing)
  # ═══════════════════════════════════════════════════════════════

  - id: critique
    depends_on: [commit]
    model: opus
    effort: high
    context: fresh
    output_format:
      type: object
      properties:
        verdict:
          type: string
          enum: ["pass", "fail"]
        criteria_results:
          type: array
          items:
            type: object
            properties:
              criterion:
                type: string
              met:
                type: boolean
              evidence:
                type: string
            required: [criterion, met, evidence]
        gaps:
          type: array
          items:
            type: string
      required: [verdict, criteria_results, gaps]
    prompt: |
      Verify the plan's acceptance criteria are ALL met.

      Plan: $plan.output
      Commit: $commit.output

      ## Instructions

      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      ```

      1. Read the plan file and extract every acceptance criterion
      2. For each criterion:
         - Check if it's met by examining code, tests, or running verification commands
         - Use codegraph queries for structural verification where specified
         - Record evidence (test output, query results, file contents)
      3. Run the full test suite:
         ```bash
         .venv/bin/python -m pytest tests/ -q
         ```
      4. Return JSON:
         - verdict: "pass" if ALL criteria met, "fail" if ANY are not
         - criteria_results: array of {criterion, met, evidence} for each
         - gaps: array of strings describing what's missing (empty if pass)

  # ═══════════════════════════════════════════════════════════════
  # Step 7b: Fix gaps if critique failed (conditional)
  # ═══════════════════════════════════════════════════════════════

  - id: implement-fix
    depends_on: [critique]
    when: "$critique.output.verdict == 'fail'"
    model: opus
    effort: high
    idle_timeout: 600000
    loop:
      prompt: |
        The critique found gaps in the implementation. Fix them.

        Gaps to address:
        $critique.output.gaps

        Full critique results:
        $critique.output.criteria_results

        Plan: $plan.output
        User request: $USER_MESSAGE

        ## Instructions

        ```bash
        REPO=$(git rev-parse --show-toplevel)
        cd "$REPO/codegraph"
        ```

        For each gap:
        1. Implement the fix
        2. Run tests: `.venv/bin/python -m pytest tests/ -q`
        3. Spawn the `feature-dev:code-reviewer` agent on changed files
        4. Run arch-check: `.venv/bin/codegraph arch-check`
        5. Commit the fix with conventional format + Co-Authored-By

        Re-verify ALL acceptance criteria from the plan.
        If ALL criteria now pass: <promise>FIXES_COMPLETE</promise>
        If gaps remain: list them and continue fixing.

      until: FIXES_COMPLETE
      max_iterations: 5
      until_bash: |
        REPO=$(git rev-parse --show-toplevel)
        cd "$REPO/codegraph"
        python -m compileall codegraph/ -q 2>&1 && .venv/bin/python -m pytest tests/ -q 2>&1
    hooks:
      PostToolUse:
        - matcher: "Write|Edit"
          response:
            systemMessage: "Run byte-compile and tests NOW to catch errors early."

  # ═══════════════════════════════════════════════════════════════
  # Final gate — independent verification (fan-in from both paths)
  # ═══════════════════════════════════════════════════════════════

  - id: final-gate
    depends_on: [critique, implement-fix]
    trigger_rule: one_success
    bash: |
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      echo "=== Final Gate ==="
      python -m compileall codegraph/ -q 2>&1 && echo "PASS: byte-compile" || exit 1
      .venv/bin/python -m pytest tests/ -q 2>&1 && echo "PASS: tests" || exit 1
      echo "FINAL_GATE_PASS"
    timeout: 120000

  # ═══════════════════════════════════════════════════════════════
  # Step 8: Update ROADMAP.md
  # ═══════════════════════════════════════════════════════════════

  - id: roadmap
    depends_on: [final-gate]
    context: fresh
    prompt: |
      Update ROADMAP.md at the repo root to reflect what was just implemented.
      This step is MANDATORY — you MUST edit and commit the ROADMAP.md file.

      Implementation summary: $implement.output
      Review summary: $review.output

      ## Instructions

      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO"
      ```

      1. Read the current ROADMAP.md
      2. Run `git log --oneline -10` to see recent commits
      3. Update these sections:
         - "TL;DR — where we are" — branch state, test count, package version
         - "Shipped since the last roadmap update" — add new commits grouped by theme
         - "Repository state" — update table
         - "What's next (ranked)" — move completed items, re-rank remaining
         - "Known open questions" — remove resolved, add new
      4. Update the "Last updated" header with today's date and commit range

      Do NOT rewrite sections that haven't changed.

      5. COMMIT the ROADMAP update (MANDATORY):
         ```bash
         git add ROADMAP.md
         git commit -m "$(cat <<'EOF'
         docs(roadmap): update session handoff

         Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>
         EOF
         )"
         ```

      6. Verify:
         ```bash
         git log --oneline -1
         ```

  # ═══════════════════════════════════════════════════════════════
  # Step 8b: Verify ROADMAP was committed (self-healing)
  # ═══════════════════════════════════════════════════════════════

  - id: roadmap-verify
    depends_on: [roadmap]
    loop:
      prompt: |
        Verify that ROADMAP.md was committed. If it was NOT committed, commit it now.

        ```bash
        REPO=$(git rev-parse --show-toplevel)
        cd "$REPO"
        ```

        Check if ROADMAP.md appears in the last 2 commits:
        ```bash
        git log --oneline -2 -- ROADMAP.md
        ```

        If no recent commit touches ROADMAP.md:
        ```bash
        git add ROADMAP.md
        git commit -m "docs(roadmap): update session handoff

        Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
        ```

        Once verified or committed: <promise>ROADMAP_COMMITTED</promise>
      until: ROADMAP_COMMITTED
      max_iterations: 3
      until_bash: |
        REPO=$(git rev-parse --show-toplevel)
        cd "$REPO"
        git log --oneline -3 --diff-filter=M -- ROADMAP.md | grep -qi roadmap

  # ═══════════════════════════════════════════════════════════════
  # Step 9: Package and publish
  # ═══════════════════════════════════════════════════════════════

  - id: package
    depends_on: [roadmap-verify]
    context: fresh
    prompt: |
      Bump the version, build, and publish to PyPI.

      ## Instructions

      ```bash
      REPO=$(git rev-parse --show-toplevel)
      cd "$REPO/codegraph"
      ```

      1. Read current version:
         ```bash
         grep '^version' pyproject.toml
         ```

      2. Bump patch: 0.1.X → 0.1.X+1. Edit pyproject.toml with the new version.

      3. COMMIT the version bump (MANDATORY — must be on the feature branch):
         ```bash
         git add pyproject.toml
         git commit -m "$(cat <<'EOF'
         chore: bump version to 0.1.X

         Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>
         EOF
         )"
         ```

      4. Verify the commit is on the feature branch:
         ```bash
         git log --oneline -1
         git branch --show-current  # must NOT be main/hotfix/dev
         ```

      5. Build:
         ```bash
         rm -f dist/*
         .venv/bin/python -m build
         ls dist/
         ```

      6. Upload:
         ```bash
         .venv/bin/twine upload dist/*
         ```

      7. Verify on PyPI:
         ```bash
         sleep 5
         curl -s https://pypi.org/pypi/cognitx-codegraph/json | python3 -c "import sys,json; print('Published:', json.load(sys.stdin)['info']['version'])"
         ```

      Output the version number and PyPI URL.

  # ═══════════════════════════════════════════════════════════════
  # Step 10: Test (unit + real-world)
  # ═══════════════════════════════════════════════════════════════

  - id: test-cycle
    depends_on: [package]
    model: opus
    context: fresh
    idle_timeout: 600000
    loop:
      prompt: |
        Run progressive validation on the codegraph package.

        Package version from previous step: $package.output

        ## Test Stages

        ```bash
        REPO=$(git rev-parse --show-toplevel)
        cd "$REPO/codegraph"
        ```

        ### Stage 1: Unit tests
        ```bash
        .venv/bin/python -m pytest tests/ -q
        python -m compileall codegraph/ -q
        ```

        ### Stage 2: Install test
        ```bash
        LATEST=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
        TMPVENV=$(mktemp -d)/venv
        python3 -m venv "$TMPVENV"
        "$TMPVENV/bin/pip" install "cognitx-codegraph[python]==$LATEST" -q
        "$TMPVENV/bin/codegraph" --help > /dev/null && echo "Install OK" || echo "Install FAILED"
        rm -rf "$(dirname $TMPVENV)"
        ```

        ### Stage 3: Self-index (dogfood)
        ```bash
        .venv/bin/codegraph index . -p codegraph -p tests --no-wipe --skip-ownership
        .venv/bin/codegraph query "MATCH (f:File) RETURN count(f) AS files"
        .venv/bin/codegraph query "MATCH (c:Class) RETURN count(c) AS classes"
        ```

        ### Stage 4: Real-world test (leytongo)
        ```bash
        LEYTONGO="$HOME/Obsidian/SecondBrain/Leyton/by-country/Spain/by-product/leytongo/leytongo-mvp"
        if [ -d "$LEYTONGO" ]; then
          .venv/bin/codegraph index "$LEYTONGO" -p "$LEYTONGO/leytongo-back" -p "$LEYTONGO/leytongo-front" --no-wipe --skip-ownership
        else
          echo "SKIP: leytongo not found"
        fi
        ```

        ### Stage 5: Arch check
        ```bash
        .venv/bin/codegraph arch-check
        ```

        ## Evaluation

        If ALL stages pass: <promise>TESTS_PASS</promise>

        If ANY stage fails:
        1. Diagnose the failure
        2. Fix the code, run code review, commit
        3. Re-package if code changed
        4. Re-run all test stages

        Do NOT signal completion until all stages pass.

      until: TESTS_PASS
      max_iterations: 10
      until_bash: |
        REPO=$(git rev-parse --show-toplevel)
        cd "$REPO/codegraph"
        .venv/bin/python -m pytest tests/ -q 2>&1 && python -m compileall codegraph/ -q 2>&1

  # ═══════════════════════════════════════════════════════════════
  # Step 11: File issues for discoveries
  # ═══════════════════════════════════════════════════════════════

  - id: file-issues
    depends_on: [test-cycle]
    context: fresh
    model: sonnet
    prompt: |
      Review the implementation and testing for any enhancement ideas, bugs in
      unrelated code, or technical debt worth tracking.

      Implementation output: $implement.output
      Review output: $review.output
      Test output: $test-cycle.output

      ## Instructions

      For each discovery that is OUT OF SCOPE for the current work:

      ```bash
      gh issue create --title "<type>: <title>" --body "$(cat <<'EOF'
      ## Context
      Discovered during implementation of the current feature.

      ## Description
      <what the issue is>

      ## Suggested approach
      <brief idea>
      EOF
      )" --label "<enhancement|bug|tech-debt>"
      ```

      If nothing was discovered, that's fine — just say "No new issues to file."

      List all issues created with their numbers and titles.

  # ═══════════════════════════════════════════════════════════════
  # Step 12: Create PR to hotfix
  # ═══════════════════════════════════════════════════════════════

  - id: create-pr
    depends_on: [file-issues]
    context: fresh
    prompt: |
      Create a pull request from the current feature branch to hotfix.

      Package version: $package.output
      Test results: $test-cycle.output

      ## Instructions

      1. Push the current branch:
         ```bash
         BRANCH=$(git branch --show-current)
         git push origin "$BRANCH"
         ```

      2. Get commit list:
         ```bash
         BRANCH=$(git branch --show-current)
         git log --oneline hotfix.."$BRANCH"
         ```

      3. Get PyPI version:
         ```bash
         curl -s https://pypi.org/pypi/cognitx-codegraph/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])"
         ```

      4. MANDATORY — if the user's original request mentioned an issue number,
         you MUST comment on the issue. Extract the issue number from: $USER_MESSAGE
         ```bash
         gh issue comment <N> --body "$(cat <<'EOF'
         ## Implementation Complete

         **Package:** cognitx-codegraph=={version}

         ### What was done
         - <summary of changes>

         ### Files changed
         - <list of files>

         ### Tests
         - {N} tests passing ({M} new)

         This issue will be automatically closed when the PR is merged.
         EOF
         )"
         ```
         Verify:
         ```bash
         gh issue view <N> --json comments --jq '.comments | length'
         ```

      5. Create the PR with `Closes #N` in the body:
         ```bash
         BRANCH=$(git branch --show-current)
         gh pr create --base hotfix --head "$BRANCH" --title "<type>: <description>" --body "$(cat <<'EOF'
         Closes #<N>

         ## Summary
         - <what changed>

         ## Test plan
         - [x] Unit tests passed
         - [x] Code review clean
