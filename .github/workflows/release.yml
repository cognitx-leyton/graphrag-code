# Publish cognitx-codegraph to PyPI on tag push.
#
# Uses PyPI Trusted Publishers (OIDC) — no API token stored in secrets.
# Prerequisite: cognitx-codegraph must be registered on PyPI with
# `cognitx-leyton/graphrag-code` configured as a Trusted Publisher for the
# `release` environment (pypi.org → Your projects → codegraph → Publishing).
#
# Tag format: `v<semver>` (e.g. v0.2.0, v0.2.1, v1.0.0-rc.1). The workflow
# derives nothing from the tag — setuptools reads the version from
# pyproject.toml, so bump that in the same commit as the tag.
#
# After publishing, the workflow waits up to 5 minutes for PyPI CDN
# propagation, then installs and smoke-tests the package in a clean venv.
#
# SAFETY: No untrusted GitHub context (issue/PR/commit titles, bodies,
# authors, refs) is interpolated into any `run:` command. Every step uses
# either hardcoded arguments or pinned actions.

name: release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        working-directory: codegraph
        run: python -m build

      - name: Read package version
        id: version
        working-directory: codegraph
        run: |
          VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: codegraph/dist

      - name: Wait for PyPI propagation
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          URL="https://pypi.org/pypi/cognitx-codegraph/${VERSION}/json"
          TIMEOUT=300
          INTERVAL=10
          ELAPSED=0
          echo "Waiting for cognitx-codegraph $VERSION to appear on PyPI..."
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if curl -sf "$URL" > /dev/null 2>&1; then
              echo "Version $VERSION available on PyPI after ${ELAPSED}s"
              exit 0
            fi
            echo "  Not yet available (${ELAPSED}s/${TIMEOUT}s)..."
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "::error::cognitx-codegraph $VERSION not available on PyPI after ${TIMEOUT}s"
          exit 1

      - name: Verify PyPI install
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install "cognitx-codegraph==${VERSION}"
          /tmp/verify-venv/bin/codegraph --help
          echo "Smoke test passed — codegraph CLI works from PyPI install"
